syntax = "proto3";
package app_center.v1.tester;

import "google/api/annotations.proto";

option go_package = "iwut-app-center/api/app_center/v1/tester;tester";

service Tester {
  rpc getTestLink(GetTestLinkRequest) returns (GetTestLinkReply) {
    option (google.api.http) = {
      get: "/tester/test-link"
    };
  }
  rpc addTester (AddTesterRequest) returns (AddTesterReply) {
    option (google.api.http) = {
      get: "/tester/add"
    };
  }
  rpc removeTester (RemoveTesterRequest) returns (RemoveTesterReply) {
    option (google.api.http) = {
      post: "/tester/remove"
      body: "*"
    };
  }
  rpc listTesters (ListTestersRequest) returns (ListTestersReply) {
    option (google.api.http) = {
      get: "/tester/list"
    };
  }
}
message GetTestLinkRequest {
  string clientId = 1;
  int32 version = 2;
  uint64 expireTime = 3; // 秒
}

message GetTestLinkReply {
  message GetTaskLinkData {
    string testLink = 1;
  }
  int32 code = 1;
  string message = 2;
  optional GetTaskLinkData data = 3;
  string traceId = 4;
}

message AddTesterRequest {
  string inviteId = 1;
}

message AddTesterReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}

message RemoveTesterRequest {
  string clientId = 1;
  int32 version = 2;
  string userId = 3;
}
message RemoveTesterReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}

message ListTestersRequest {
  string clientId = 1;
  int32 version = 2;
}
message ListTestersReply {
  message TesterInfo {
    string userId = 1;
    string username = 2;
  }
  int32 code = 1;
  string message = 2;
  repeated TesterInfo data = 3;
  string traceId = 4;
}