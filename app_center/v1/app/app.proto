syntax = "proto3";

package app_center.v1.app;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
option go_package = "iwut-app-center/api/app_center/v1/app;app";

service App {
  rpc getApplicationInfo (GetApplicationInfoRequest) returns (GetApplicationInfoReply) {
    option (google.api.http) = {
      get: "/app/info"
    };
  }
  rpc getAppVersionInfo (GetAppVersionInfoRequest) returns (GetAppVersionInfoReply) {
    option (google.api.http) = {
      get: "/app/version-info"
    };
  }
  rpc getAppList (google.protobuf.Empty) returns (GetAppListReply) {
    option (google.api.http) = {
      get: "/app/list"
    };
  }
  rpc createApp (CreateAppRequest) returns (CreateAppReply) {
    option (google.api.http) = {
      post: "/app/create"
      body: "*"
    };
  }
  rpc createAppVersion (CreateAppVersionRequest) returns (CreateAppVersionReply) {
    option (google.api.http) = {
      post: "/app/create-version"
      body: "*"
    };
  }
  rpc updateAppRule (UpdateAppRuleRequest) returns (UpdateAppRuleReply) {
    option (google.api.http) = {
      post: "/app/update-rule"
      body: "*"
    };
  }
  rpc updateAppRedirectUri (UpdateAppRedirectUriRequest) returns (UpdateAppRedirectUriReply) {
    option (google.api.http) = {
      post: "/app/update-redirect-uri"
      body: "*"
    };
  }
}

//message GetAppListRequest {
//  int32 page = 1;
//  int32 pageSize = 2;
//
//}
message GetAppListReply {
  message ApplicationVersion {
    string clientId = 1;
    int32 internalVersion = 2;
    string version = 3;
    repeated string basicScope = 4;
    repeated string optionalScope = 5;
    string displayName = 6;
    string description = 7;
    string url = 8;
    string icon = 9;
    string status = 10;
    google.protobuf.Timestamp createdAt = 11;
    string name = 12;
    string admin = 13;
    repeated string collaborators = 14;
  }

  int32 code = 1;
  string message = 2;
  repeated ApplicationVersion data = 3;
  string traceId = 4;
}

message GetAppVersionInfoRequest {
  string clientId = 1;
  int32 version = 2;
}
message GetAppVersionInfoReply {
  message ApplicationVersion {
    string clientId = 1;
    int32 internalVersion = 2;
    string version = 3;
    repeated string basicScope = 4;
    repeated string optionalScope = 5;
    string displayName = 6;
    string description = 7;
    string url = 8;
    string icon = 9;
    string status = 10;
    google.protobuf.Timestamp createdAt = 11;
    google.protobuf.Timestamp deletedAt = 12;
    // 这里没有返回 tester, 大且没用
  }
  int32 code = 1;
  string message = 2;
  optional ApplicationVersion data = 3;
  string traceId = 4;
}

message GetApplicationInfoRequest {
  string clientId = 1;
}

message GetApplicationInfoReply {
  message Application {
    string clientId = 1;
    string clientSecret = 2;
    int32 stableVersion = 3;
    int32 greyVersion = 4;
    int32 betaVersion = 5;
    int32 greyShuffleCode = 6;
    double greyPercentage = 7;
    string name = 8;
    string status = 9;
    string admin = 10;
    repeated string collaborators = 11;
    int32 next_version = 12;
    string id = 13;
    google.protobuf.Timestamp createdAt = 14;
    google.protobuf.Timestamp deletedAt = 15;
    repeated string redirectUri = 16;
  }
  int32 code = 1;
  string message = 2;
  optional Application data = 3;
  string traceId = 4;
}

message CreateAppRequest {
  string name = 1;
}

message CreateAppReply {
  message CreateAppReplyData {
    string clientId = 1;
    string clientSecret = 2;
    string name = 3;
    string admin = 4;
    string id = 5;
  }
  int32 code = 1;
  string message = 2;
  optional CreateAppReplyData data = 3;
  string traceId = 4;
}

message CreateAppVersionRequest {
  string clientId = 1;
  repeated string basicScope = 2;
  repeated string optionalScope = 3;
  string version = 4;
  string displayName = 5;
  string description = 6;
  string url = 7;
  string icon = 8;
}
message CreateAppVersionReply {
  message CreateAppVersionReplyData {
    string clientId = 1;
    int32 internalVersion = 2;
  }
  int32 code = 1;
  string message = 2;
  optional CreateAppVersionReplyData data = 3;
  string traceId = 4;
}

message UpdateAppRuleRequest {
  message Rule {
    string operator = 1;
    repeated Rule rules = 2;
    optional string Field = 3;
    optional string DefaultField = 4;
    optional string value = 5;
  }
  string clientId = 1;
  Rule rule = 2;
}

message UpdateAppRuleReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}

message UpdateAppRedirectUriRequest {
  string clientId = 1;
  repeated string redirectUri = 2;
}

message UpdateAppRedirectUriReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}