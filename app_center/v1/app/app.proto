syntax = "proto3";

package app_center.v1.app;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
option go_package = "iwut-app-center/api/app_center/v1/app;app";

service App {
  rpc getApplicationInfo (GetApplicationInfoRequest) returns (GetApplicationInfoReply) {
    option (google.api.http) = {
      get: "/app/info"
    };
  }
  rpc getAppList (google.protobuf.Empty) returns (GetAppListReply) {
    option (google.api.http) = {
      get: "/app/list"
    };
  }
  rpc createApp (CreateAppRequest) returns (CreateAppReply) {
    option (google.api.http) = {
      post: "/app/create"
      body: "*"
    };
  }
  rpc updateAppRule (UpdateAppRuleRequest) returns (UpdateAppRuleReply) {
    option (google.api.http) = {
      post: "/app/update-rule"
      body: "*"
    };
  }
  rpc updateAppRedirectUri (UpdateAppRedirectUriRequest) returns (UpdateAppRedirectUriReply) {
    option (google.api.http) = {
      post: "/app/update-redirect-uri"
      body: "*"
    };
  }
  rpc updateAppVersionStatus (UpdateAppVersionStatusRequest) returns (UpdateAppVersionStatusReply) {
    option (google.api.http) = {
      post: "/app/update-collaborators"
      body: "*"
    };
  }
  rpc refreshAppSecret (RefreshAppSecretRequest) returns (RefreshAppSecretReply) {
    option (google.api.http) = {
      post: "/app/refresh-secret"
      body: "*"
    };
  }
  rpc updateAppGreyPercentage (UpdateAppGreyPercentageRequest) returns (UpdateAppGreyPercentageReply) {
    option (google.api.http) = {
      post: "/app/update-grey-percentage"
      body: "*"
    };
  }
  rpc updateAppGreyShuffleCode (UpdateAppGreyShuffleCodeRequest) returns (UpdateAppGreyShuffleCodeReply) {
    option (google.api.http) = {
      post: "/app/update-grey-shuffle-code"
      body: "*"
    };
  }
}

message GetAppListReply {
  message ApplicationVersion {
    string clientId = 1;
    int32 internalVersion = 2;
    string version = 3;
    repeated string basicScope = 4;
    repeated string optionalScope = 5;
    string displayName = 6;
    string description = 7;
    string url = 8;
    string icon = 9;
    string status = 10;
    google.protobuf.Timestamp createdAt = 11;
    string name = 12;
    string admin = 13;
    repeated string collaborators = 14;
  }

  int32 code = 1;
  string message = 2;
  repeated ApplicationVersion data = 3;
  string traceId = 4;
}

message GetApplicationInfoRequest {
  string clientId = 1;
}

message GetApplicationInfoReply {
  message Application {
    string clientId = 1;
    string clientSecret = 2;
    int32 stableVersion = 3;
    int32 greyVersion = 4;
    int32 betaVersion = 5;
    int32 greyShuffleCode = 6;
    double greyPercentage = 7;
    string name = 8;
    string status = 9;
    string admin = 10;
    repeated string collaborators = 11;
    int32 next_version = 12;
    string id = 13;
    google.protobuf.Timestamp createdAt = 14;
    google.protobuf.Timestamp deletedAt = 15;
    repeated string redirectUri = 16;
  }
  int32 code = 1;
  string message = 2;
  optional Application data = 3;
  string traceId = 4;
}

message CreateAppRequest {
  string name = 1;
}

message CreateAppReply {
  message CreateAppReplyData {
    string clientId = 1;
    string clientSecret = 2;
    string name = 3;
    string admin = 4;
    string id = 5;
  }
  int32 code = 1;
  string message = 2;
  optional CreateAppReplyData data = 3;
  string traceId = 4;
}

message UpdateAppRuleRequest {
  message Rule {
    string operator = 1;
    repeated Rule rules = 2;
    optional string Field = 3;
    optional string DefaultField = 4;
    optional string value = 5;
  }
  string clientId = 1;
  Rule rule = 2;
}

message UpdateAppRuleReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}

message UpdateAppRedirectUriRequest {
  string clientId = 1;
  repeated string redirectUri = 2;
}

message UpdateAppRedirectUriReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}

message UpdateAppVersionStatusRequest {
  string clientId = 1;
  int32 version = 2;
  string status = 3;
}
message UpdateAppVersionStatusReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}

message RefreshAppSecretRequest {
  string clientId = 1;
}
message RefreshAppSecretReply {
  message RefreshAppSecretReplyData {
    string clientSecret = 1;
  }
  int32 code = 1;
  string message = 2;
  optional RefreshAppSecretReplyData data = 3;
  string traceId = 4;
}

message UpdateAppGreyPercentageRequest {
  string clientId = 1;
  double greyPercentage = 2;
}
message UpdateAppGreyPercentageReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}

message UpdateAppGreyShuffleCodeRequest {
  string clientId = 1;
}
message UpdateAppGreyShuffleCodeReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}