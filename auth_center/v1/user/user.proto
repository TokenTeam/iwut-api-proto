syntax = "proto3";

package auth_center.v1.user;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
option go_package = "iwut-auth_center/api/gen/go/auth_center/v1/user;user";

service User {
  rpc updatePassword (UpdatePasswordRequest) returns (UpdatePasswordReply) {
    option (google.api.http) = {
      post: "/user/update-password"
      body: "*"
    };
  }
  rpc deleteAccount (google.protobuf.Empty) returns (DeleteAccountReply) {
    option (google.api.http) = {
      get: "/user/delete-account"
    };
  }
  rpc getProfile (GetProfileRequest) returns (GetProfileReply) {
    option (google.api.http) = {
      get: "/user/profile"
    };
  }

  rpc updateProfile (google.protobuf.Struct) returns (UpdateProfileReply) {
    option (google.api.http) = {
      post: "/user/update-profile"
      body: "*"
    };
  }

  rpc getProfileKeys (google.protobuf.Empty) returns (GetProfileKeysReply) {
    option (google.api.http) = {
      get: "/user/profile-keys"
    };
  }

  rpc updateUserConsent (UpdateUserConsentRequest) returns (UpdateUserConsentReply) {
    option (google.api.http) = {
      post: "/user/update-consent"
      body: "*"
    };
  }

  rpc setUserDeveloperId (SetUserDeveloperIdRequest) returns (SetUserDeveloperIdReply) {
    option (google.api.http) = {
      post: "/user/set-developer-id"
      body: "*"
    };
  }

  rpc revokeAuthorization (RevokeAuthorizationRequest) returns (RevokeAuthorizationReply) {
    option (google.api.http) = {
      post: "/user/revoke_authorization"
      body: "*"
    };
  }
}

message UpdatePasswordRequest {
  string oldPassword = 1;
  string newPassword = 2;
}

message UpdatePasswordReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}

message DeleteAccountReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}

message GetProfileRequest {
  optional string userId = 1;
  repeated string keys = 2;
}
message GetProfileReply {
  message GetProfileReplyData {
    string userId = 1;
    string email = 2;
    google.protobuf.Timestamp createdAt = 3;
    google.protobuf.Timestamp updatedAt = 4;
    map<string, string> attrs = 5;
  }
  int32 code = 1;
  string message = 2;
  optional GetProfileReplyData data = 3;
  string traceId = 4;
}
//  string nick = 1;
//  string realName = 2;
//  string studentNumber = 3;
//  string avatarUrl = 4;
//  string gender = 5;
//  string whutEmail = 6;
//  string region = 7; // 校区
//  string school = 8; // 院系
//  string birthday = 9;
//  string qq = 10;
//  string phone = 11;
message UpdateProfileReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}

message GetProfileKeysReply {
  message GetProfileKeysReplyData {
    repeated string baseKeys = 1;
    repeated string extraProfileKeys = 2;
  }
  int32 code = 1;
  string message = 2;
  optional GetProfileKeysReplyData data = 3;
  string traceId = 4;
}

message UpdateUserConsentRequest {
  string clientId = 1;
  int32 clientVersion = 2;
  repeated string optionalScopes = 4;
}

message UpdateUserConsentReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}

message SetUserDeveloperIdRequest {
  string developerId = 1;
}

message SetUserDeveloperIdReply {
  int32 code = 1;
  string message = 2;
  string traceId = 3;
}

message RevokeAuthorizationRequest {
  string clientId = 1;
  string status = 2;
}

message RevokeAuthorizationReply {
  int32 code = 1;
  string message = 2;
  optional string trace_id = 3;
}